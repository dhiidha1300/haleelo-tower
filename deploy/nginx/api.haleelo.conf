# ───────────────────────────────────────────────────────────────────────────
# Haleelo Tower — Laravel API (api.YOUR_DOMAIN)
# Place at: /etc/nginx/sites-available/api.haleelo.conf
# Enable:   ln -s /etc/nginx/sites-available/api.haleelo.conf /etc/nginx/sites-enabled/
# Then:     nginx -t && systemctl reload nginx
# SSL is added automatically by: certbot --nginx -d api.YOUR_DOMAIN
# ───────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name api.YOUR_DOMAIN;

    # Laravel serves from the public/ directory
    root /var/www/haleelo/api/public;
    index index.php;

    # Max upload size — must be >= the largest file (documents/avatars). Keep in
    # sync with PHP upload_max_filesize / post_max_size in php.ini.
    client_max_body_size 12M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Adjust the PHP-FPM socket version to match the installed PHP (e.g. php8.3-fpm)
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/haleelo-api.access.log;
    error_log  /var/log/nginx/haleelo-api.error.log;
}
