# ───────────────────────────────────────────────────────────────────────────
# Haleelo Tower — Next.js Admin Panel (admin.YOUR_DOMAIN)
# The Next.js app runs under PM2 on 127.0.0.1:3000; Nginx is a reverse proxy.
# Place at: /etc/nginx/sites-available/admin.haleelo.conf
# Enable:   ln -s /etc/nginx/sites-available/admin.haleelo.conf /etc/nginx/sites-enabled/
# Then:     nginx -t && systemctl reload nginx
# SSL:      certbot --nginx -d admin.YOUR_DOMAIN
# ───────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name admin.YOUR_DOMAIN;

    client_max_body_size 12M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/haleelo-admin.access.log;
    error_log  /var/log/nginx/haleelo-admin.error.log;
}
